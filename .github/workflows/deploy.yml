name: Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/856528771607/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@livergate-web-project.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy livergate-website \
            --source . \
            --region asia-northeast2 \
            --project livergate-web-project \
            --allow-unauthenticated
