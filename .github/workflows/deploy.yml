name: Deploy to Cloud Run

on:
  push:
    branches: [main]

# Default-deny; each job opts into only the permissions it needs.
permissions: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: projects/856528771607/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deploy@livergate-web-project.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy livergate-website \
            --source . \
            --region asia-northeast2 \
            --project livergate-web-project \
            --allow-unauthenticated \
            --min-instances=0 \
            --max-instances=3 \
            --concurrency=80 \
            --cpu=1 \
            --memory=512Mi \
            --timeout=60
